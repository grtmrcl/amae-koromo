server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    auth_basic "__AUTH_BASIC_REALM__";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # _ から始まるパスは404
    location ~ ^/_ {
        return 404;
    }

    # static/favicon2 は長期キャッシュ
    location ~ ^/(static|favicon2)/ {
        expires 7d;
        add_header Cache-Control "public, immutable, max-age=604800, s-maxage=604800";
    }

    # SPA フォールバック: ファイルが存在しない場合は index.html を返す
    location / {
        try_files $uri $uri/ /index.html;
    }
}
